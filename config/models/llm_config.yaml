# LLM Configuration
# Change the 'default' value to switch between providers
# Add your API keys in the .env file

default: "openrouter"  # Options: openai, claude, gemini, ollama, groq, openrouter

# =============================================================================
# RECOMMENDED OPEN-SOURCE MODELS (2025-2026)
# =============================================================================
# Best Reasoning Models (Chain-of-Thought):
#   - deepseek-ai/deepseek-r1 (Best overall reasoning, matches o1)
#   - deepseek-ai/deepseek-r1-distill-qwen-32b (Lighter, outperforms o1-mini)
#   - qwen/qwen3-235b-a22b (Best for complex tasks)
#   - deepseek-ai/deepseek-v3 (Great general purpose + reasoning)
#
# Best for Speed + Quality Balance:
#   - deepseek-ai/deepseek-r1-distill-qwen-8b (Fast, beats Gemini 2.5 Flash)
#   - qwen/qwen3-32b (Excellent quality)
#   - meta-llama/llama-3.3-70b-instruct (Fast, reliable)
#
# Best Local Models (Ollama):
#   - deepseek-r1:8b or deepseek-r1:32b
#   - qwen2.5:32b
#   - llama3.3:70b
# =============================================================================

providers:
  openai:
    model: "gpt-4o"
    api_key_env: "OPENAI_API_KEY"
    base_url: null
    temperature: 0.7
    max_tokens: 4096
    timeout: 60

  claude:
    model: "claude-3-5-sonnet-20241022"
    api_key_env: "ANTHROPIC_API_KEY"
    base_url: null
    temperature: 0.7
    max_tokens: 4096
    timeout: 60

  gemini:
    model: "gemini-2.5-flash-preview-05-20"
    api_key_env: "GOOGLE_API_KEY"
    temperature: 0.7
    max_tokens: 8192
    timeout: 60

  ollama:
    # Recommended: deepseek-r1:8b for reasoning, qwen2.5:32b for general
    model: "deepseek-r1:8b"
    base_url: "http://localhost:11434"
    temperature: 0.7
    max_tokens: 4096
    timeout: 120
    # Alternative models to try:
    # - qwen2.5:32b (excellent general purpose)
    # - llama3.3:70b (if you have the VRAM)
    # - deepseek-r1:32b (best reasoning if resources allow)
    # - phi4:14b (small but capable)

  groq:
    # Groq offers fast inference for open-source models
    # Recommended: llama-3.3-70b-versatile or deepseek-r1-distill-llama-70b
    model: "deepseek-r1-distill-llama-70b"
    api_key_env: "GROQ_API_KEY"
    base_url: "https://api.groq.com/openai/v1"
    temperature: 0.7
    max_tokens: 4096
    timeout: 60
    # Alternative models on Groq:
    # - llama-3.3-70b-versatile (fast, reliable)
    # - mixtral-8x7b-32768 (good balance)
    # - gemma2-9b-it (lightweight)

  openrouter:
    # OpenRouter provides access to many models.
    # Default model below is the winner of the Task 7.4 interview-engine
    # benchmark (backend/benchmarks/llm_1779219059.json):
    #   deepseek/deepseek-v3.2-exp -- 3/3 cases passed, 2.62s avg latency,
    #   strongest follow-up specificity (named Kafka vs RabbitMQ trade-offs
    #   explicitly), valid raw JSON without code fences, $0.27/M input.
    model: "deepseek/deepseek-v3.2-exp"
    api_key_env: "OPENROUTER_API_KEY"
    base_url: "https://openrouter.ai/api/v1"
    temperature: 0.7
    max_tokens: 8192
    timeout: 90
    # Fallback models, ordered by benchmark score. Not auto-consumed by the
    # current LLMService -- documented here so operators can swap by editing
    # `model:` above without re-running the benchmark.
    fallback_models:
      - "anthropic/claude-haiku-4.5"     # 3/3 pass, 2.34s, fenced JSON but parseable
      - "google/gemini-2.5-flash"        # 3/3 pass, 1.86s, tested baseline (prior default)
      - "moonshotai/kimi-k2-0905"        # 3/3 pass, 5.8s, deepest AZ-conflict drill-down
    # Other strong alternatives on OpenRouter:
    # BEST REASONING (thinking models):
    # - deepseek/deepseek-r1 (best open reasoning model)
    # - deepseek/deepseek-r1-distill-qwen-32b (lighter, still excellent)
    # - qwen/qwen3-235b-a22b (massive, very capable)
    #
    # BEST GENERAL PURPOSE:
    # - deepseek/deepseek-chat-v3 (excellent all-around)
    # - qwen/qwen-2.5-72b-instruct (strong general)
    # - meta-llama/llama-3.3-70b-instruct (reliable)
    #
    # BEST SPEED/COST:
    # - deepseek/deepseek-r1-distill-qwen-8b (fast reasoning)
    # - qwen/qwen-2.5-32b-instruct (good balance)

# =============================================================================
# TASK-SPECIFIC MODEL SELECTION
# Override default model for specific tasks
# Set to provider name (e.g., "groq") or specific model path
# =============================================================================
task_models:
  # Resume analysis benefits from strong reasoning
  resume_analysis: null  # Uses default

  # Interview questions need creativity + reasoning + specificity.
  # Routed to openrouter -> deepseek/deepseek-v3.2-exp per Task 7.4 benchmark.
  # See top-level `interview_question:` block below for the picked-model summary,
  # and backend/benchmarks/llm_1779219059.json for the raw 3-turn comparison.
  interview_questions: "openrouter"

  # Response evaluation needs consistency + reliable JSON output.
  # Routed to the same openrouter provider so scoring uses the same model
  # the candidate-facing engine just spoke to (style/scoring drift = lower).
  response_evaluation: "openrouter"

  # Report generation needs good writing
  report_generation: null  # Uses default

  # Experience extraction (for career analytics)
  experience_extraction: null  # Uses default

# =============================================================================
# INTERVIEW-ENGINE MODEL PICK (Task 7.4)
# Authoritative record of the benchmarked winner + runners-up.
# The interview engine pulls the active model via task_models.interview_questions
# -> providers.openrouter.model. Keep this block in sync with that path.
# Raw benchmark JSON: backend/benchmarks/llm_1779219059.json
# =============================================================================
interview_question:
  provider: openrouter
  model: "deepseek/deepseek-v3.2-exp"
  fallback_models:
    - "anthropic/claude-haiku-4.5"
    - "google/gemini-2.5-flash"   # always included as a tested baseline
    - "moonshotai/kimi-k2-0905"
  temperature: 0.7
  max_tokens: 1024
  # Why this won:
  # - 3/3 cases passed in benchmark (icebreaker, follow-up, scoring JSON)
  # - 2.62s avg latency (well under the 8s/turn target)
  # - Follow-up actually drilled into the Kafka-vs-RabbitMQ trade-off rather
  #   than asking a generic "tell me more" question.
  # - Scoring returned raw, parseable JSON (no markdown fencing).
  # - Cheapest of the contenders that hit all quality bars ($0.27/M in).

# =============================================================================
# REASONING MODE CONFIGURATION
# For models that support chain-of-thought (DeepSeek R1, Qwen-Thinking, etc.)
# =============================================================================
reasoning_mode:
  enabled: true
  # Models that support thinking mode
  thinking_models:
    - "deepseek/deepseek-r1"
    - "deepseek/deepseek-r1-distill-qwen-32b"
    - "deepseek/deepseek-r1-distill-qwen-8b"
    - "deepseek-r1"
    - "qwen/qwen3-235b-a22b-thinking"
  # Whether to show thinking process to user
  show_thinking: false
  # Max tokens for thinking (separate from response)
  thinking_budget: 2048
